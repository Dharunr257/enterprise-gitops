apiVersion: v1
kind: Service

metadata:
  name: frontend-service
  namespace: {{ .Values.namespace }}
  labels:
    app: ims-frontend
    {{- include "inventory-app.labels" . | nindent 4 }}

spec:
  type: {{ .Values.frontend.service.type }}

  selector:
    app: ims-frontend

  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 80
      protocol: TCP