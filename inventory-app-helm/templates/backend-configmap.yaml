apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "inventory-app.labels" . | nindent 4 }}
data:
  PORT: "5000"
  DB_HOST: "mysql-service"
  DB_PORT: "3306"
  DB_NAME: {{ .Values.mysql.auth.database | quote }}
  NODE_ENV: "production"