apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql
  namespace: {{ .Values.namespace }}
  labels:
    app: mysql
    {{- include "inventory-app.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.mysql.replicaCount }}

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql
        {{- include "inventory-app.labels" . | nindent 8 }}

    spec:
      containers:
        - name: mysql

          image: "{{ .Values.mysql.image.repository }}:{{ .Values.mysql.image.tag }}"
          imagePullPolicy: {{ .Values.mysql.image.pullPolicy }}

          ports:
            - containerPort: 3306

          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD

            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE

            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER

            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

          resources:
            requests:
              cpu: {{ .Values.resources.mysql.requests.cpu }}
              memory: {{ .Values.resources.mysql.requests.memory }}

            limits:
              cpu: {{ .Values.resources.mysql.limits.cpu }}
              memory: {{ .Values.resources.mysql.limits.memory }}

          startupProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  mysqladmin ping \
                  -h 127.0.0.1 \
                  -uroot \
                  -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  mysqladmin ping \
                  -h 127.0.0.1 \
                  -uroot \
                  -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5

      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc